apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vaultwarden
  template:
    metadata:
      labels:
        app: vaultwarden
    spec:
      containers:
      - name: vaultwarden
        image: vaultwarden/server:1.30.1-alpine
        imagePullPolicy: IfNotPresent
        ports:
          - name: http-port
            containerPort: 80
        env:
          - name: SIGNUPS_ALLOWED
            valueFrom:
              configMapKeyRef:
                name: vaultwarden-config
                key: SIGNUPS_ALLOWED
          - name: DATABASE_URL
            valueFrom:
              configMapKeyRef:
                name: vaultwarden-config
                key: DATABASE_URL
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 1Gi
            cpu: "1"
